<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <div class="brand">
        <h1>TaskFlow</h1>
        <span class="badge">v1.2</span>
        <button id="themeToggle" class="theme-btn">🌙</button>
      </div>

      <p class="subtitle">Productivity Management System</p>

      <div class="release">
        <span class="dot"></span>
        Stable Release • 2026
      </div>
    </header>

    <section class="card">
      <div class="form-group">
        <input type="text" id="title" placeholder="Ex: Estudar Node.js" />
        <input type="date" id="date" />
        <select id="priority">
          <option value="Baixa">Baixa</option>
          <option value="Media" selected>Média</option>
          <option value="Alta">Alta</option>
        </select>
      </div>

      <button id="addTask">Adicionar Tarefa</button>

      <div class="controls">
        <input type="text" id="search" placeholder="Pesquisar..." />
        <div class="filters">
          <button data-filter="all" class="active">Todas</button>
          <button data-filter="pending">Pendentes</button>
          <button data-filter="done">Concluídas</button>
        </div>
      </div>

      <div class="stats">
        <span id="totalTasks">0 tarefas</span>
      </div>

      
      <div class="dashboard">
        <div class="dash-card">
          <h3 id="totalCount">0</h3>
          <span>Total</span>
        </div>
        <div class="dash-card">
          <h3 id="pendingCount">0</h3>
          <span>Pendentes</span>
        </div>
        <div class="dash-card">
          <h3 id="doneCount">0</h3>
          <span>Concluídas</span>
        </div>
      </div>

      
      <div class="progress-wrap">
        <div class="progress-head">
          <span>Progresso</span>
          <strong id="progressText">0%</strong>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

     
      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <span>Carregando tarefas...</span>
      </div>

      <ul id="taskList"></ul>
    </section>

    <footer>
      <small>
        © 2026 TaskFlow • Productivity System <br>
        Built by Éder Félix • Version 1.2
      </small>
    </footer>
  </main>

  <div id="toast" class="toast hidden">
    <div class="toast-content">
      <strong id="toastTitle">Título</strong>
      <p id="toastMsg">Mensagem</p>
    </div>
    <button id="toastClose" class="toast-close">✕</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
